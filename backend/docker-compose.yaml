version: "3.8"

services:
  mongo:
    image: mongo
    ports:
    - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: aman_admin
      MONGO_INITDB_ROOT_PASSWORD: aman_password
  
  mongo-express:
    image: mongo-express
    ports:
    - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: aman_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: aman_password
      ME_CONFIG_MONGODB_URL: mongodb://aman_admin:aman_password@mongo:27017/
